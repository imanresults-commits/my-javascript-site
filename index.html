<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Influencer Masterclass</title>
    <style>
        /* Modern, clean reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Deep black gradient background matching your image */
        body {
            background: linear-gradient(to bottom, #000000 70%, #151515 100%);
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        /* Container to keep content tight and readable */
        .container {
            max-width: 750px;
            width: 100%;
        }

        /* Main Underlined Headline */
        h1 {
            font-size: 2.2rem;
            font-weight: normal;
            line-height: 1.4;
            margin-bottom: 25px;
            text-decoration: underline;
            text-underline-offset: 6px;
        }

        /* Emphasized italic/bold text tags */
        h1 span.highlight {
            font-weight: bold;
            font-style: italic;
        }

        /* Sub-headline text link styling */
        p.sub-headline {
            font-size: 1.05rem;
            color: #ffffff;
            margin-bottom: 35px;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Video container layout with white/gray double-layered border border */
        .video-box {
            width: 100%;
            max-width: 550px;
            margin: 0 auto 40px auto;
            border: 1px solid #555555;
            padding: 4px;
            background-color: #000;
        }

        .video-box img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #ffffff;
        }

        /* Premium black call-to-action button */
        .cta-button {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            padding: 12px 30px;
            border: 1px solid #ffffff;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0px 4px 10px rgba(255, 255, 255, 0.05);
        }

        /* Slight hover glow effect for interaction */
        .cta-button:hover {
            background-color: #ffffff;
            color: #000000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Sales Header -->
        <h1>How any dad influencer can make an extra $5,000 from your audience, using AI in one month or Less for <span class="highlight">FREE</span></h1>

        <!-- Call to Action Text -->
        <p class="sub-headline">Don't be left behind. Click the video below to find out how.</p>

        <!-- Video Placeholder Box -->
        <div class="video-box">
            <!-- Replace the src below with your actual thumbnail link later if needed -->
            <img src="https://unsplash.com" alt="Video Thumbnail Presentation">
        </div>

        <!-- Booking Button link -->
        <!-- Replace '#' inside href with your Calendly or booking scheduler link -->
        <a href="#" class="cta-button">Book A Call</a>
    </div>

</body>
</html>
